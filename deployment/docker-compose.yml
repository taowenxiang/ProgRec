services:
  reverse-proxy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - progrec-api

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  progrec-api:
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ../:/srv/app
      - artifacts_data:/srv/artifacts
    depends_on:
      - postgres
      - redis

  progrec-worker:
    build:
      context: ..
      dockerfile: deployment/worker.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ../:/srv/app
      - artifacts_data:/srv/artifacts
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
  artifacts_data:
  caddy_data:
  caddy_config:
