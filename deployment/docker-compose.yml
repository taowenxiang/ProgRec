services:
  reverse-proxy:
    image: caddy:2
    restart: unless-stopped
    profiles:
      - direct-exposure
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${PROGREC_HOST_ROOT}/data/caddy:/data
      - ${PROGREC_HOST_ROOT}/data/caddy-config:/config
    depends_on:
      - progrec-api

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${PROGREC_HOST_ROOT}/data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:8
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${PROGREC_HOST_ROOT}/data/redis:/data

  progrec-api:
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command:
      - /bin/sh
      - -lc
      - python deployment/scripts/migrate.py && python -m uvicorn progrec_service.app:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:${API_PORT}:8000"
    volumes:
      - ../:/srv/app:ro
      - ${PROGREC_HOST_ROOT}/data/artifacts:/srv/artifacts
      - ${PROGREC_HOST_ROOT}/logs:/srv/logs
    depends_on:
      - postgres
      - redis

  progrec-worker:
    build:
      context: ..
      dockerfile: deployment/worker.Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command:
      - /bin/sh
      - -lc
      - python deployment/scripts/migrate.py && python -m progrec_service.worker
    volumes:
      - ../:/srv/app:ro
      - ${PROGREC_HOST_ROOT}/data/artifacts:/srv/artifacts
      - ${PROGREC_HOST_ROOT}/logs:/srv/logs
    depends_on:
      - postgres
      - redis

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - cloudflare-tunnel
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - progrec-api
